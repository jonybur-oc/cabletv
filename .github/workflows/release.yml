name: Build & Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  create-release:
    runs-on: ubuntu-latest
    outputs:
      release-id: ${{ steps.create.outputs.result }}
    steps:
      - name: Create GitHub Release
        id: create
        uses: actions/github-script@v7
        with:
          script: |
            const { data } = await github.rest.repos.createRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag_name: context.ref.replace('refs/tags/', ''),
              name: context.ref.replace('refs/tags/', ''),
              draft: false,
              prerelease: false,
            });
            return data.id;

  build:
    needs: create-release
    strategy:
      matrix:
        include:
          - os: macos-latest
            platform: mac
          - os: windows-latest
            platform: win

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build Vite app
        run: npm run build

      - name: Compile Electron main
        run: npm run electron:compile

      # macOS: import signing certificate
      - name: Import macOS certificate
        if: matrix.platform == 'mac'
        env:
          MAC_CERT_P12: ${{ secrets.MAC_CERT_P12 }}
          MAC_CERT_PASSWORD: ${{ secrets.MAC_CERT_PASSWORD }}
        run: |
          KEYCHAIN_PATH=$RUNNER_TEMP/cabletv.keychain-db
          KEYCHAIN_PASSWORD=$(openssl rand -base64 20)

          echo "$MAC_CERT_P12" | base64 --decode > $RUNNER_TEMP/cert.p12

          security create-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security import $RUNNER_TEMP/cert.p12 \
            -k $KEYCHAIN_PATH \
            -P "$MAC_CERT_PASSWORD" \
            -T /usr/bin/codesign \
            -T /usr/bin/security
          security list-keychain -d user -s $KEYCHAIN_PATH

      - name: Build & publish Electron app
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          # macOS signing — only active on mac runner
          CSC_KEYCHAIN: ${{ matrix.platform == 'mac' && format('{0}/cabletv.keychain-db', runner.temp) || '' }}
          CSC_KEY_PASSWORD: ${{ secrets.MAC_CERT_PASSWORD }}
        run: npx electron-builder --${{ matrix.platform }} --publish always
